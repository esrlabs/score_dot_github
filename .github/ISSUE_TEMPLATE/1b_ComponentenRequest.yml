name: Component Request
description: Issue to track a Component Request / Modification
title: "Your Component Request /Modification title"
type: 'Component Request'
body:
  - type: markdown
    attributes:
      value: "## <ins>Component Request / Modification Ticket creation</ins>"
  - type: textarea
    attributes:
      label: Component Request /Modification Description
      description: |
        - Use following template within a PR and link it to this issue
          [Change Management Component Request Template](https://eclipse-score.github.io/process_description/main/process_areas/change_management/guidance/change_management_component_template.html) needs to be used
    validations:
      required: true
  - type: checkboxes
    attributes:
      label: Expected Changes ot work products
      options:
        - label: Requirements
        - label: Architecture
        - label: Safety Analysis
        - label: Security Analysis
        - label: Detailed Design
        - label: Implementation and Testing
        - label: all  
          required: true
  - type: textarea
    attributes:
      label: Impact analysis
      description: |
        - Summary of the impacted analysis 
        [Change Management Impact Analysis Template](https://eclipse-score.github.io/process_description/main/process_areas/change_management/guidance/change_management_impact_analysis_template.html) needs to be used
    validations:
      required: true
  - type: checkboxes
    attributes:
      label: Safety or Security relevance
      options:
        - label: none
        - label: Safety relevant
        - label: Security relevant
    validations:
      required: true
  - type: dropdown
    attributes:
      label: Expected required ASIL classification
      options:
        - QM
        - ASIL_B
      default: 0
    validations:
      required: true
  - type: dropdown
    attributes:
      label: Expected Implementation Version (Release)
      options:
        - '1.0'
        - '1.5'
        - '2.0'
        - '3.0'
      default: 0
    validations:
      required: false